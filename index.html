<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>D1114181004 - 星際躲避者 (Star Dodger)</title>
    <style>
        body { margin: 0; background: #050505; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #gameContainer { position: relative; }
        canvas { border: 4px solid #333; background: #000; cursor: none; box-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .info { margin-top: 15px; text-align: center; width: 600px; }
        #score { font-size: 28px; color: #00ffcc; font-weight: bold; text-shadow: 0 0 5px #00ffcc; }
        .hud { display: flex; justify-content: space-between; width: 100%; }
        .student-id { color: #888; font-size: 12px; }

        /* 遊戲結束/主畫面遮罩 */
        #uiOverlay {
            position: absolute;
            top: 0; left: 0; width: 600px; height: 400px;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10;
        }
        
        #logoImg { width: 300px; height: auto; margin-bottom: 20px; }
        
        #startText {
            font-size: 24px; color: #fff;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="uiOverlay">
            <img src="logo.png" alt="Star Dodger Logo" id="logoImg">
            <div id="startText">點擊螢幕開始遊戲</div>
        </div>
    </div>

    <div class="info">
        <div class="hud">
            <span id="score">分數: 0</span>
            <span class="student-id">學號: D1114181004</span>
        </div>
        <p>滑鼠移動控制藍色方塊，躲避紅色隕石！</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const uiOverlay = document.getElementById('uiOverlay');
        const startText = document.getElementById('startText');

        canvas.width = 600;
        canvas.height = 400;

        // 遊戲狀態
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let player = { x: 300, y: 350, size: 20, color: '#00ffcc' };
        let enemies = [];
        let animationId;

        // 監聽滑鼠移動 (僅在遊戲進行時)
        canvas.addEventListener('mousemove', (e) => {
            if (gameState !== 'PLAYING') return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.size / 2;
            
            // 邊界限制
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
        });

        // 監聽點擊 (開始或重玩)
        uiOverlay.addEventListener('click', () => {
            if (gameState === 'START' || gameState === 'GAMEOVER') {
                startGame();
            }
        });

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            enemies = [];
            player.x = 300;
            scoreElement.innerText = "分數: 0";
            uiOverlay.style.display = 'none'; // 隱藏主畫面
            gameLoop();
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            cancelAnimationFrame(animationId);
            startText.innerText = `遊戲結束！最終分數: ${score}\n\n點擊重玩`;
            startText.style.color = '#ff4444';
            uiOverlay.style.display = 'flex'; // 顯示結束畫面
        }

        function spawnEnemy() {
            // 隨時間稍微增加難度
            let spawnChance = 0.05 + (score * 0.0005);
            if (Math.random() < spawnChance) {
                let size = Math.random() * 25 + 10;
                enemies.push({
                    x: Math.random() * (canvas.width - size),
                    y: -size,
                    size: size,
                    // 速度隨分數增加
                    speed: (Math.random() * 3 + 2) + (score * 0.01)
                });
            }
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            enemies.forEach((enemy, index) => {
                enemy.y += enemy.speed;

                // 碰撞檢測 (AABB)
                if (player.x < enemy.x + enemy.size && player.x + player.size > enemy.x &&
                    player.y < enemy.y + enemy.size && player.y + player.size > enemy.y) {
                    gameOver();
                }

                // 移除出界敵方並加分
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                    score++;
                    scoreElement.innerText = "分數: " + score;
                }
            });

            spawnEnemy();
        }

        function draw() {
            // 清空畫布 (加上一點拖影效果)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'PLAYING') {
                // 畫玩家 (加上發光效果)
                ctx.shadowBlur = 10;
                ctx.shadowColor = player.color;
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.size, player.size);
                ctx.shadowBlur = 0; // 重設

                // 畫敵人
                ctx.fillStyle = '#ff4444';
                enemies.forEach(enemy => {
                    ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
                });
            }
        }

        function gameLoop() {
            if (gameState === 'PLAYING') {
                update();
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        // 初始化：先畫一次背景，顯示 START 狀態
        draw(); 
    </script>
</body>
</html>
